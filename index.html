<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding System</title>

<style>

/* ================= LOGIN ================= */
#loginPage {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #0b5e5e, #062c2c);
  font-family: Arial, sans-serif;
}

.login-card {
  width: 340px;
  padding: 35px;
  border-radius: 14px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  text-align: center;
  color: white;
}

.login-card input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  outline: none;
}

.login-card button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #00b3b3;
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#error {
  color: #ff6b6b;
  font-size: 13px;
}

/* ================= SYSTEM ================= */
.hidden { display:none; }

body {
  margin:0;
  font-family: Arial;
  background:#f4f7fa;
}

header {
  background:#007a7a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  margin-top:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.tab {
  display:inline-block;
  padding:10px;
  margin-right:5px;
  background:#ddd;
  cursor:pointer;
  border-radius:6px;
}

.tab.active {
  background:#007a7a;
  color:white;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
}

button {
  width:100%;
  padding:12px;
  background:#007a7a;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.output {
  background:#eef7f7;
  padding:15px;
  white-space:pre-line;
  border-left:5px solid #007a7a;
}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginPage">
  <div class="login-card">
    <h2>Onboarding System</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Sign In</button>
    <p id="error"></p>
  </div>
</div>

<!-- ================= SYSTEM ================= -->
<div id="system" class="hidden">

<header>
  <div id="roleTitle">Onboarding System</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="card">
    <div id="menu"></div>
  </div>

  <div id="onboard" class="card hidden">
    <h3>Onboarding</h3>
    <input id="n_name" placeholder="Full Name">
    <input id="n_dept" placeholder="Department">
    <button onclick="submitOnboard()">Submit</button>
  </div>

  <div id="offboard" class="card hidden">
    <h3>Offboarding</h3>
    <input id="o_name" placeholder="Full Name">
    <input id="o_dept" placeholder="Department">
    <button onclick="submitOffboard()">Submit</button>
  </div>

  <div id="transfer" class="card hidden">
    <h3>Transfer</h3>
    <input id="t_name" placeholder="Full Name">
    <input id="t_from" placeholder="From Dept">
    <input id="t_to" placeholder="To Dept">
    <button onclick="submitTransfer()">Submit</button>
  </div>

  <div class="card">
    <h3>Output</h3>
    <div id="output" class="output">No data</div>
  </div>

</div>
</div>

<script>

/* ================= USERS ================= */
const users = {
  hr: { pass:"hr123", role:"HR" },
  it: { pass:"it123", role:"IT" },
  head: { pass:"head123", role:"Dept Head" }
};

let currentRole = "";

/* ================= LOGIN FIXED ================= */
function login(){
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;
  const error = document.getElementById("error");

  if(users[u] && users[u].pass === p){

    currentRole = users[u].role;

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("system").classList.remove("hidden");

    document.getElementById("roleTitle").innerText =
      "Logged in as: " + currentRole;

    loadMenu();

  } else {
    error.innerText = "Invalid login";
  }
}

/* ================= MENU ================= */
function loadMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  if(currentRole === "HR"){
    menu.innerHTML += `<div class="tab" onclick="show('onboard')">Onboarding</div>`;
    menu.innerHTML += `<div class="tab" onclick="show('offboard')">Offboarding</div>`;
  }

  if(currentRole === "Dept Head"){
    menu.innerHTML += `<div class="tab" onclick="show('transfer')">Transfer Request</div>`;
  }

  if(currentRole === "IT"){
    menu.innerHTML += `<div class="tab" onclick="show('transfer')">View Requests</div>`;
  }
}

/* ================= SHOW FIXED ================= */
function show(id){

  document.getElementById("onboard").classList.add("hidden");
  document.getElementById("offboard").classList.add("hidden");
  document.getElementById("transfer").classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}

/* ================= ACTIONS ================= */
function submitOnboard(){
  document.getElementById("output").innerText =
`ONBOARD REQUEST
Name: ${document.getElementById("n_name").value}
Dept: ${document.getElementById("n_dept").value}
Role: ${currentRole}`;
}

function submitOffboard(){
  document.getElementById("output").innerText =
`OFFBOARD REQUEST
Name: ${document.getElementById("o_name").value}
Dept: ${document.getElementById("o_dept").value}
Role: ${currentRole}`;
}

function submitTransfer(){
  document.getElementById("output").innerText =
`TRANSFER REQUEST
Name: ${document.getElementById("t_name").value}
From: ${document.getElementById("t_from").value}
To: ${document.getElementById("t_to").value}
Role: ${currentRole}`;
}

/* ================= LOGOUT ================= */
function logout(){
  location.reload();
}

</script>

</body>
</html>
