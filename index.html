<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f7fa;
}

/* LOGIN */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b5e5e,#062c2c);
}

.login-card{
  width:340px;
  padding:30px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  color:white;
  text-align:center;
}

.login-card input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

.login-card button{
  width:100%;
  padding:12px;
  background:#00b3b3;
  border:none;
  color:white;
  border-radius:6px;
}

/* SYSTEM */
.hidden{display:none;}

header{
  background:#007a7a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  margin-top:15px;
  border-radius:10px;
}

.tab{
  display:inline-block;
  padding:10px;
  margin-right:5px;
  background:#ddd;
  border-radius:6px;
  cursor:pointer;
}

.tab.active{
  background:#28a745;
  color:white;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
}

button{
  width:100%;
  padding:12px;
  background:#007a7a;
  color:white;
  border:none;
  border-radius:6px;
}

#popup{
  position:fixed;
  top:20px;
  right:20px;
  background:#28a745;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <h2>Onboarding System</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error"></p>
  </div>
</div>

<!-- SYSTEM -->
<div id="system" class="hidden">

<header>
  <div>Onboarding System</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
  <div class="tab active" onclick="show('onboard',this)">Onboarding</div>
  <div class="tab" onclick="show('offboard',this)">Offboarding</div>
  <div class="tab" onclick="show('transfer',this)">Transfer</div>
  <div class="tab" onclick="show('search',this)">Search</div>
</div>

<!-- ONBOARD -->
<div id="onboard" class="card">
<h3>Onboarding</h3>
<input id="n_name" placeholder="Full Name">
<input id="n_dept" placeholder="Department">
<input id="n_job" placeholder="Job Title">

<select id="n_email"><option>YES</option><option>NO</option></select>
<select id="n_fin"><option>YES</option><option>NO</option></select>

<textarea id="n_notes" placeholder="Notes"></textarea>

<button onclick="save('onboard')">Submit</button>
</div>

<!-- OFFBOARD -->
<div id="offboard" class="card hidden">
<h3>Offboarding</h3>
<input id="o_name" placeholder="Full Name">
<input id="o_dept" placeholder="Department">

<select id="o_email"><option>Disable</option><option>Keep</option></select>
<select id="o_fin"><option>Revoke</option><option>Keep</option></select>

<textarea id="o_notes"></textarea>

<button onclick="save('offboard')">Submit</button>
</div>

<!-- TRANSFER -->
<div id="transfer" class="card hidden">
<h3>Transfer</h3>
<input id="t_name" placeholder="Full Name">
<input id="t_from" placeholder="From Department">
<input id="t_to" placeholder="To Department">

<textarea id="t_notes"></textarea>

<button onclick="save('transfer')">Submit</button>
</div>

<!-- SEARCH -->
<div id="search" class="card hidden">
<h3>Search</h3>
<input id="searchInput" placeholder="Search name">
<button onclick="searchData()">Search</button>
<div id="searchResult"></div>
</div>

</div>
</div>

<div id="popup">Saved ✔</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
</script>

<script>
/* LOGIN */
const users = {
  hr:"hr123",
  it:"it123"
};

function login(){
  const u=username.value;
  const p=password.value;

  if(users[u] && users[u]===p){
    loginPage.style.display="none";
    system.classList.remove("hidden");
  }else{
    error.innerText="Wrong login";
  }
}

document.addEventListener("keydown",e=>{
  if(e.key==="Enter" && loginPage.style.display !== "none"){
    login();
  }
});

/* TAB */
function show(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  onboard.classList.add("hidden");
  offboard.classList.add("hidden");
  transfer.classList.add("hidden");
  search.classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}

/* SAVE TO FIREBASE */
async function save(type){

  let obj = {type, time:new Date().toLocaleString()};

  if(type==="onboard"){
    obj.name=n_name.value;
    obj.dept=n_dept.value;
    obj.job=n_job.value;
    obj.email=n_email.value;
    obj.fin=n_fin.value;
    obj.notes=n_notes.value;
  }

  if(type==="offboard"){
    obj.name=o_name.value;
    obj.dept=o_dept.value;
    obj.email=o_email.value;
    obj.fin=o_fin.value;
    obj.notes=o_notes.value;
  }

  if(type==="transfer"){
    obj.name=t_name.value;
    obj.from=t_from.value;
    obj.to=t_to.value;
    obj.notes=t_notes.value;
  }

  await addDoc(collection(db,"requests"), obj);

  popup();
  clearForm();
}

/* SEARCH */
async function searchData(){

  const snap = await getDocs(collection(db,"requests"));

  let q = searchInput.value.toLowerCase();

  let res = [];

  snap.forEach(doc=>{
    let d = doc.data();
    if(d.name && d.name.toLowerCase().includes(q)){
      res.push(d);
    }
  });

  searchResult.innerText =
  res.length
  ? res.map(r=>`${r.type} | ${r.name} | ${r.dept || ""} | ${r.time}`).join("\n")
  : "No results";
}

/* CLEAR */
function clearForm(){
  document.querySelectorAll("input,textarea").forEach(i=>i.value="");
}

/* POPUP */
function popup(){
  const p=document.getElementById("popup");
  p.style.display="block";
  setTimeout(()=>p.style.display="none",2000);
}

/* LOGOUT */
function logout(){
  location.reload();
}
</script>

</body>
</html>
