<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding System</title>

<style>

/* ================= LOGIN ================= */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0b5e5e,#062c2c);
  font-family:Arial;
}

.login-card{
  width:340px;
  padding:30px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  text-align:center;
  color:white;
}

.login-card input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

.login-card button{
  width:100%;
  padding:12px;
  background:#00b3b3;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* ================= SYSTEM ================= */
.hidden{display:none;}

body{
  margin:0;
  font-family:Arial;
  background:#f4f7fa;
}

header{
  background:#007a7a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* MENU */
.container{max-width:1100px;margin:auto;padding:20px;}

.card{
  background:white;
  padding:20px;
  margin-top:15px;
  border-radius:10px;
}

/* TABS */
.tab{
  display:inline-block;
  padding:10px;
  margin-right:5px;
  background:#ddd;
  cursor:pointer;
  border-radius:6px;
}

.tab.active{
  background:#00a86b;
  color:white;
}

/* INPUTS */
input,select,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
}

button{
  width:100%;
  padding:12px;
  background:#007a7a;
  color:white;
  border:none;
  border-radius:6px;
}

/* OUTPUT */
.output{
  background:#eef7f7;
  padding:15px;
  white-space:pre-line;
  border-left:5px solid #007a7a;
}

/* POPUP */
#popup{
  position:fixed;
  top:20px;
  right:20px;
  background:#00a86b;
  color:white;
  padding:12px 18px;
  border-radius:8px;
  display:none;
}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginPage">
  <div class="login-card">
    <h2>Onboarding System</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="error"></p>
  </div>
</div>

<!-- ================= SYSTEM ================= -->
<div id="system" class="hidden">

<header>
  <div>Onboarding System</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- MENU -->
<div class="card">
  <div class="tab active" onclick="show('onboard',this)">Onboarding</div>
  <div class="tab" onclick="show('offboard',this)">Offboarding</div>
  <div class="tab" onclick="show('transfer',this)">Transfer</div>
  <div class="tab" onclick="showSearch(this)">Search</div>
</div>

<!-- ONBOARD -->
<div id="onboard" class="card">

<h3>New Employee Onboarding</h3>

<input id="n_name" placeholder="Full Name">
<input id="n_contact" placeholder="Contact Number">
<input id="n_job" placeholder="Job Title">
<input id="n_dept" placeholder="Department">
<input id="n_head" placeholder="Department Head">

<select id="n_email"><option>YES</option><option>NO</option></select>
<select id="n_fin"><option>YES</option><option>NO</option></select>

<input id="n_folder" placeholder="Folder Name">
<textarea id="n_soft"></textarea>
<textarea id="n_notes"></textarea>

<button onclick="save('onboard')">Submit</button>
</div>

<!-- OFFBOARD -->
<div id="offboard" class="card hidden">

<h3>Employee Offboarding</h3>

<input id="o_name" placeholder="Full Name">
<input id="o_dept" placeholder="Department">
<input id="o_last" type="date">

<select id="o_email">
<option>Disable Email</option><option>Keep Active</option>
</select>

<select id="o_fin">
<option>Revoke Access</option><option>Keep Access</option>
</select>

<select id="o_folder">
<option>Remove Access</option><option>Keep Access</option>
</select>

<textarea id="o_reason"></textarea>

<button onclick="save('offboard')">Submit</button>
</div>

<!-- TRANSFER -->
<div id="transfer" class="card hidden">

<h3>Department Transfer</h3>

<input id="t_name" placeholder="Full Name">
<input id="t_old" placeholder="From Department">
<input id="t_new" placeholder="To Department">

<select id="t_fin">
<option>Update Access</option><option>No Change</option>
</select>

<select id="t_folder">
<option>Update Folder</option><option>No Change</option>
</select>

<textarea id="t_notes"></textarea>

<button onclick="save('transfer')">Submit</button>
</div>

<!-- SEARCH -->
<div id="searchBox" class="card hidden">

<h3>Search Records</h3>

<input id="searchInput" placeholder="Search by name">
<button onclick="searchData()">Search</button>

<div id="searchResult" class="output">No data</div>
</div>

</div>
</div>

<!-- POPUP -->
<div id="popup">Saved Successfully ✔</div>

<script>

/* ================= LOGIN ================= */
const users = {
  hr:{pass:"hr123"},
  it:{pass:"it123"},
  head:{pass:"head123"}
};

function login(){

  const u=username.value.trim();
  const p=password.value.trim();

  if(users[u] && users[u].pass===p){
    loginPage.style.display="none";
    system.classList.remove("hidden");
  }else{
    error.innerText="Wrong login details";
  }
}

/* ENTER KEY LOGIN */
document.addEventListener("keydown",e=>{
  if(e.key==="Enter") login();
});

/* ================= ACTIVE TAB ================= */
function setActive(el){
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.remove("active");
  });
  if(el) el.classList.add("active");
}

/* ================= NAV ================= */
function show(id,el){

  onboard.classList.add("hidden");
  offboard.classList.add("hidden");
  transfer.classList.add("hidden");
  searchBox.classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");

  setActive(el);
}

function showSearch(el){
  show("searchBox",el);
}

/* ================= STORAGE ================= */
function getData(){
  return JSON.parse(localStorage.getItem("hrData") || "[]");
}

function setData(data){
  localStorage.setItem("hrData", JSON.stringify(data));
}

/* ================= SAVE ================= */
function save(type){

  let record={type,time:new Date().toLocaleString()};

  if(type==="onboard"){
    record.name=n_name.value;
    record.dept=n_dept.value;
  }

  if(type==="offboard"){
    record.name=o_name.value;
    record.dept=o_dept.value;
  }

  if(type==="transfer"){
    record.name=t_name.value;
    record.from=t_old.value;
    record.to=t_new.value;
  }

  let data=getData();
  data.push(record);
  setData(data);

  clearForm(type);
  popup();
}

/* ================= CLEAR ================= */
function clearForm(type){

  if(type==="onboard"){
    n_name.value=""; n_dept.value=""; n_job.value="";
  }

  if(type==="offboard"){
    o_name.value=""; o_dept.value=""; o_reason.value="";
  }

  if(type==="transfer"){
    t_name.value=""; t_old.value=""; t_new.value="";
  }
}

/* ================= POPUP ================= */
function popup(){
  document.getElementById("popup").style.display="block";
  setTimeout(()=>popup.style.display="none",2000);
}

/* ================= SEARCH ================= */
function searchData(){

  let q=searchInput.value.toLowerCase();
  let data=getData();

  let res=data.filter(x=>x.name && x.name.toLowerCase().includes(q));

  searchResult.innerText =
  res.length
  ? res.map(r=>`${r.type.toUpperCase()} | ${r.name} | ${r.dept || ""} | ${r.time}`).join("\n")
  : "No records found";
}

/* LOGOUT */
function logout(){
  location.reload();
}

</script>

</body>
</html>
