<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Onboarding System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f7fa;
}

.hidden{display:none;}

/* LOGIN */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b5e5e,#062c2c);
}

.login-card{
  width:340px;
  padding:30px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  color:white;
  text-align:center;
}

.login-card input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

.login-card button{
  width:100%;
  padding:12px;
  background:#00b3b3;
  border:none;
  color:white;
  border-radius:6px;
}

/* SYSTEM */
header{
  background:#007a7a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  margin-top:15px;
  border-radius:10px;
}

.tab{
  display:inline-block;
  padding:10px;
  margin-right:5px;
  background:#ddd;
  border-radius:6px;
  cursor:pointer;
}

.tab.active{
  background:#28a745;
  color:white;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
}

button{
  width:100%;
  padding:12px;
  background:#007a7a;
  color:white;
  border:none;
  border-radius:6px;
}

label{
  font-size:13px;
  font-weight:bold;
}

#popup{
  position:fixed;
  top:20px;
  right:20px;
  background:#28a745;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <h2>HR System Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error"></p>
  </div>
</div>

<!-- SYSTEM -->
<div id="system" class="hidden">

<header>
  <div>HR Onboarding System</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- TABS -->
<div class="card">
  <div class="tab active" onclick="show('onboard',this)">Onboarding</div>
  <div class="tab" onclick="show('offboard',this)">Offboarding</div>
  <div class="tab" onclick="show('transfer',this)">Transfer</div>
  <div class="tab" onclick="show('search',this)">Search</div>
</div>

<!-- ONBOARD -->
<div id="onboard" class="card">
<h3>Employee Onboarding</h3>

<label>Full Name</label>
<input id="n_name">

<label>Department</label>
<input id="n_dept">

<label>Job Title</label>
<input id="n_job">

<label>Employment Type</label>
<select id="n_type">
  <option>Full-Time</option>
  <option>Part-Time</option>
  <option>Contract</option>
  <option>Intern</option>
</select>

<label>Start Date</label>
<input id="n_start" type="date">

<!-- EMAIL -->
<label>Company Email Required?</label>
<select id="n_email" onchange="toggleEmailBox()">
  <option value="No">No</option>
  <option value="Yes">Yes</option>
</select>

<div id="emailBox" style="display:none;">
  <label>Email Address to Create</label>
  <input id="n_email_address" placeholder="e.g. john.smith@company.com">
</div>

<!-- FINPOWER -->
<label>System Access (Finpower)</label>
<select id="n_finpower">
  <option>No</option>
  <option>Yes</option>
</select>

<!-- APPS -->
<label>Additional Software Apps Needed?</label>
<select id="n_apps" onchange="toggleAppsBox()">
  <option value="No">No</option>
  <option value="Yes">Yes</option>
</select>

<div id="appsBox" style="display:none;">
  <label>Required Applications</label>
  <textarea id="n_app_list"></textarea>

  <label>Reason for Software Access</label>
  <textarea id="n_app_reason"></textarea>

  <label>Email Justification (IT Approval Reason)</label>
  <textarea id="n_app_email_reason"></textarea>
</div>

<label>System Access Details</label>
<textarea id="n_access"></textarea>

<label>Notes</label>
<textarea id="n_notes"></textarea>

<button onclick="save('onboard')">Submit Onboarding</button>
</div>

<!-- OFFBOARD -->
<div id="offboard" class="card hidden">
<h3>Employee Offboarding</h3>

<label>Full Name</label>
<input id="o_name">

<label>Department</label>
<input id="o_dept">

<label>Last Working Day</label>
<input id="o_lastday" type="date">

<label>Reason</label>
<select id="o_reason">
  <option>Resignation</option>
  <option>Termination</option>
  <option>Contract End</option>
  <option>Retirement</option>
</select>

<label>Email Handling</label>
<select id="o_email">
  <option>Disable Immediately</option>
  <option>Keep Temporary</option>
</select>

<label>System Access</label>
<select id="o_access">
  <option>Revoke All</option>
  <option>Partial Access</option>
</select>

<label>Asset Return</label>
<select id="o_assets">
  <option>Required</option>
  <option>Not Required</option>
</select>

<label>Notes</label>
<textarea id="o_notes"></textarea>

<button onclick="save('offboard')">Submit Offboarding</button>
</div>

<!-- TRANSFER -->
<div id="transfer" class="card hidden">
<h3>Employee Transfer</h3>

<label>Full Name</label>
<input id="t_name">

<label>Current Department</label>
<input id="t_from">

<label>New Department</label>
<input id="t_to">

<label>New Job Title</label>
<input id="t_title">

<label>Effective Date</label>
<input id="t_date" type="date">

<label>Reason</label>
<select id="t_reason">
  <option>Promotion</option>
  <option>Restructure</option>
  <option>Employee Request</option>
  <option>Management Decision</option>
</select>

<label>System Access Update</label>
<textarea id="t_access"></textarea>

<label>Notes</label>
<textarea id="t_notes"></textarea>

<button onclick="save('transfer')">Submit Transfer</button>
</div>

<!-- SEARCH -->
<div id="search" class="card hidden">
<h3>Search Records</h3>
<input id="searchInput">
<button onclick="searchData()">Search</button>
<pre id="searchResult"></pre>
</div>

</div>
</div>

<div id="popup">Saved ✔</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
</script>

<script>

/* LOGIN */
const users = {
  hr:"hr123",
  it:"it123"
};

function login(){
  const u=username.value;
  const p=password.value;

  if(users[u] && users[u]===p){
    loginPage.style.display="none";
    system.classList.remove("hidden");
  }else{
    error.innerText="Wrong login";
  }
}

function logout(){
  location.reload();
}

/* TAB */
function show(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  onboard.classList.add("hidden");
  offboard.classList.add("hidden");
  transfer.classList.add("hidden");
  search.classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}

/* TOGGLES */
function toggleEmailBox(){
  document.getElementById("emailBox").style.display =
    n_email.value === "Yes" ? "block" : "none";
}

function toggleAppsBox(){
  document.getElementById("appsBox").style.display =
    n_apps.value === "Yes" ? "block" : "none";
}

/* SAVE */
async function save(type){

  let obj = {type,time:new Date().toLocaleString()};

  if(type==="onboard"){
    obj.name=n_name.value;
    obj.dept=n_dept.value;
    obj.job=n_job.value;
    obj.type=n_type.value;
    obj.start=n_start.value;

    obj.emailRequired=n_email.value;
    if(n_email.value==="Yes"){
      obj.emailAddress=n_email_address.value;
    }

    obj.finpowerAccess=n_finpower.value;

    obj.additionalApps=n_apps.value;
    if(n_apps.value==="Yes"){
      obj.appList=n_app_list.value;
      obj.appReason=n_app_reason.value;
      obj.appEmailJustification=n_app_email_reason.value;
    }

    obj.systemAccess=n_access.value;
    obj.notes=n_notes.value;
  }

  if(type==="offboard"){
    obj.name=o_name.value;
    obj.dept=o_dept.value;
    obj.lastDay=o_lastday.value;
    obj.reason=o_reason.value;
    obj.email=o_email.value;
    obj.access=o_access.value;
    obj.assets=o_assets.value;
    obj.notes=o_notes.value;
  }

  if(type==="transfer"){
    obj.name=t_name.value;
    obj.from=t_from.value;
    obj.to=t_to.value;
    obj.title=t_title.value;
    obj.date=t_date.value;
    obj.reason=t_reason.value;
    obj.access=t_access.value;
    obj.notes=t_notes.value;
  }

  await addDoc(collection(db,"requests"), obj);

  popup();
  clearForm();
}

/* SEARCH */
async function searchData(){

  const snap = await getDocs(collection(db,"requests"));
  let q = searchInput.value.toLowerCase();

  let res = [];

  snap.forEach(doc=>{
    let d = doc.data();
    if(d.name && d.name.toLowerCase().includes(q)){
      res.push(d);
    }
  });

  searchResult.innerText =
  res.length
  ? res.map(r=>`${r.type} | ${r.name} | ${r.dept || ""} | ${r.time}`).join("\n")
  : "No results";
}

/* CLEAR */
function clearForm(){
  document.querySelectorAll("input,textarea").forEach(i=>i.value="");
}

/* POPUP */
function popup(){
  const p=document.getElementById("popup");
  p.style.display="block";
  setTimeout(()=>p.style.display="none",2000);
}

</script>

</body>
</html>
