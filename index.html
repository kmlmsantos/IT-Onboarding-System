<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR System</title>

<style>
*{box-sizing:border-box;font-family:Arial;}
body{margin:0;background:#eef3f7;}

/* LOGIN */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b5e5e,#062c2c);
}

.login-card{
  width:320px;
  padding:25px;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  color:white;
  text-align:center;
}

.login-card input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

.login-card button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#00b3b3;
  color:white;
}

/* SYSTEM */
.hidden{display:none;}

header{
  background:#007a7a;
  color:white;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:18px;
  margin-top:14px;
  border-radius:12px;
}

.tab{
  display:inline-block;
  padding:8px 12px;
  margin-right:6px;
  background:#ddd;
  border-radius:8px;
  cursor:pointer;
}

.tab.active{background:#28a745;color:white;}

label{
  font-size:12px;
  font-weight:bold;
  display:block;
  margin-top:10px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
}

textarea{height:70px;}

.helper{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.box{
  background:#f8f9fa;
  padding:10px;
  border-radius:8px;
  margin-top:5px;
}

/* POPUP */
#popup{
  position:fixed;
  top:20px;
  right:20px;
  background:#28a745;
  color:white;
  padding:10px 14px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <h2>HR System</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="error" style="color:#ffb3b3;font-size:12px;"></div>
  </div>
</div>

<!-- SYSTEM -->
<div id="system" class="hidden">

<header>
  <div>HR System</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- TABS -->
<div class="card">
  <div class="tab active" onclick="show('onboard',this)">Onboarding</div>
  <div class="tab" onclick="show('offboard',this)">Offboarding</div>
  <div class="tab" onclick="show('transfer',this)">Transfer</div>
</div>

<!-- ================= ONBOARD ================= -->
<div id="onboard" class="card">
<h3>Onboarding</h3>

<label>Full Name</label>
<input id="n_name">

<label>Department</label>
<input id="n_dept">

<label>Job Title</label>
<input id="n_job">

<label>Start Date</label>
<input id="n_start" type="date">

<!-- EMAIL -->
<label>Email Required?</label>
<select id="n_email" onchange="toggleEmail()">
  <option>No</option>
  <option>Yes</option>
</select>

<div id="emailBox" class="box" style="display:none;">
  <div class="helper">✉ Which email should IT create?</div>
  <input id="n_email_address" placeholder="john.smith@company.com">
</div>

<!-- NETWORK SHARE FIXED -->
<label>Network Share Folder Required?</label>
<select id="n_share" onchange="toggleShare()">
  <option>No</option>
  <option>Yes</option>
</select>

<div id="shareBox" class="box" style="display:none;">

  <div class="helper">📁 Network Share Folder Access Request</div>

  <label>Folder Path to Create / Access</label>
  <input id="n_share_folder" placeholder="/Departments/HR/JohnSmith">

  <label>Access Type</label>
  <select id="n_share_access">
    <option>Read Only</option>
    <option>Read / Write</option>
    <option>Full Control</option>
  </select>

</div>

<!-- APPS -->
<label>Additional Applications Required?</label>
<select id="n_apps" onchange="toggleApps()">
  <option>No</option>
  <option>Yes</option>
</select>

<div id="appsBox" class="box" style="display:none;">
  <div class="helper">🧩 Applications Required</div>
  <textarea id="n_app_list" placeholder="SAP, VPN, Outlook..."></textarea>

  <div class="helper">📌 Reason</div>
  <textarea id="n_app_reason"></textarea>
</div>

<label>Notes</label>
<textarea id="n_notes"></textarea>

<button onclick="save()">Submit</button>
</div>

<!-- ================= OFFBOARD ================= -->
<div id="offboard" class="card hidden">
<h3>Offboarding</h3>

<input id="o_name" placeholder="Name">
<input id="o_dept" placeholder="Department">
<input id="o_lastday" type="date">

<select id="o_reason">
  <option>Resignation</option>
  <option>Termination</option>
  <option>Contract End</option>
</select>

<textarea id="o_notes"></textarea>

<button onclick="save()">Submit</button>
</div>

<!-- ================= TRANSFER ================= -->
<div id="transfer" class="card hidden">
<h3>Transfer</h3>

<label>Full Name</label>
<input id="t_name">

<label>From Department</label>
<input id="t_from">

<label>To Department</label>
<input id="t_to">

<label>Email Required?</label>
<select id="t_email" onchange="toggleTEmail()">
  <option>No</option>
  <option>Yes</option>
</select>

<div id="tEmailBox" class="box" style="display:none;">
  <div class="helper">✉ Which email should IT create?</div>
  <input id="t_email_address">
</div>

<label>Network Share Folder Required?</label>
<select id="t_share" onchange="toggleTShare()">
  <option>No</option>
  <option>Yes</option>
</select>

<div id="tShareBox" class="box" style="display:none;">
  <div class="helper">📁 Network Share Folder Access Request</div>

  <label>Folder Path to Create / Access</label>
  <input id="t_share_folder">

  <label>Access Type</label>
  <select id="t_share_access">
    <option>Read Only</option>
    <option>Read / Write</option>
    <option>Full Control</option>
  </select>
</div>

<label>Notes</label>
<textarea id="t_notes"></textarea>

<button onclick="save()">Submit</button>
</div>

</div>
</div>

<div id="popup">Saved ✔</div>

<script>
const users={hr:"hr123",it:"it123"};

/* LOGIN */
function login(){
  if(users[username.value]===password.value){
    localStorage.setItem("hr","1");
    loginPage.style.display="none";
    system.classList.remove("hidden");
  }else{
    error.innerText="Wrong credentials";
  }
}

/* SESSION */
window.onload=()=>{
  if(localStorage.getItem("hr")==="1"){
    loginPage.style.display="none";
    system.classList.remove("hidden");
  }
};

/* ENTER */
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(system.classList.contains("hidden")) login();
  }
});

/* LOGOUT */
function logout(){
  localStorage.removeItem("hr");
  location.reload();
}

/* TAB */
function show(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  onboard.classList.add("hidden");
  offboard.classList.add("hidden");
  transfer.classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}

/* TOGGLES */
function toggleEmail(){
  emailBox.style.display=n_email.value==="Yes"?"block":"none";
}
function toggleShare(){
  shareBox.style.display=n_share.value==="Yes"?"block":"none";
}
function toggleApps(){
  appsBox.style.display=n_apps.value==="Yes"?"block":"none";
}
function toggleTEmail(){
  tEmailBox.style.display=t_email.value==="Yes"?"block":"none";
}
function toggleTShare(){
  tShareBox.style.display=t_share.value==="Yes"?"block":"none";
}

/* SAVE */
function save(){
  popup();
}

/* POPUP */
function popup(){
  let p=document.getElementById("popup");
  p.style.display="block";
  setTimeout(()=>p.style.display="none",2000);
}
</script>

</body>
</html>
