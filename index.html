<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR System</title>

<style>
*{box-sizing:border-box;font-family:Arial;}
body{margin:0;background:#eef3f7;}

.hidden{display:none;}

/* LOGIN */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b5e5e,#062c2c);
}

.login-card{
  width:320px;
  padding:25px;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  color:white;
  text-align:center;
}

.login-card input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#007a7a;
  color:white;
  cursor:pointer;
}

/* SYSTEM */
header{
  background:#007a7a;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:18px;
  margin-top:14px;
  border-radius:12px;
}

.tab{
  display:inline-block;
  padding:8px 12px;
  margin-right:6px;
  background:#ddd;
  border-radius:8px;
  cursor:pointer;
}

.tab.active{background:#28a745;color:white;}

label{font-size:12px;font-weight:bold;}
input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
}

.box{
  background:#f8f9fa;
  padding:10px;
  border-radius:8px;
  margin-top:5px;
}

/* SEARCH + RESULTS */
#resultBox{
  margin-top:10px;
  background:#fff;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.record{
  border-bottom:1px solid #eee;
  padding:8px 0;
}

/* PRINT */
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{
    position:absolute;
    left:0;
    top:0;
    width:100%;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <h2>HR System</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="error"></div>
  </div>
</div>

<!-- SYSTEM -->
<div id="system" class="hidden">

<header>
  <div>HR System</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- SEARCH -->
<div class="card">
  <h3>Search Records</h3>
  <input id="searchInput" placeholder="Search by name">
  <button onclick="searchData()">Search</button>

  <div id="resultBox"></div>
</div>

<!-- FORM -->
<div class="card">
  <h3>Onboarding / Transfer / Offboarding</h3>

  <input id="name" placeholder="Full Name">
  <input id="dept" placeholder="Department">

  <select id="type">
    <option>Onboarding</option>
    <option>Transfer</option>
    <option>Offboarding</option>
  </select>

  <textarea id="notes" placeholder="Notes"></textarea>

  <button onclick="save()">Submit</button>
</div>

<!-- PRINT AREA -->
<div id="printArea" class="card hidden"></div>

</div>
</div>

<script>
let records = JSON.parse(localStorage.getItem("hr_records") || "[]");

/* LOGIN */
function login(){
  const users={hr:"hr123",it:"it123"};
  if(users[username.value]===password.value){
    loginPage.style.display="none";
    system.classList.remove("hidden");
  }else{
    error.innerText="Wrong login";
  }
}

/* SAVE */
function save(){
  const obj={
    name:name.value,
    dept:dept.value,
    type:type.value,
    notes:notes.value,
    time:new Date().toLocaleString()
  };

  records.push(obj);
  localStorage.setItem("hr_records",JSON.stringify(records));

  alert("Saved ✔");
  name.value="";
  dept.value="";
  notes.value="";
}

/* SEARCH */
function searchData(){
  let q = searchInput.value.toLowerCase();
  let res = records.filter(r=>r.name.toLowerCase().includes(q));

  let box = document.getElementById("resultBox");
  box.innerHTML = res.length ? "" : "No results";

  res.forEach((r,i)=>{
    let div=document.createElement("div");
    div.className="record";
    div.innerHTML=`
      <b>${r.name}</b> (${r.type})<br>
      ${r.dept}<br>
      ${r.time}<br>
      <button onclick="printRecord(${records.indexOf(r)})">Print</button>
    `;
    box.appendChild(div);
  });
}

/* PRINT */
function printRecord(i){
  let r = records[i];

  let printArea = document.getElementById("printArea");
  printArea.classList.remove("hidden");

  printArea.innerHTML=`
    <h2>HR Request</h2>
    <p><b>Name:</b> ${r.name}</p>
    <p><b>Department:</b> ${r.dept}</p>
    <p><b>Type:</b> ${r.type}</p>
    <p><b>Notes:</b> ${r.notes}</p>
    <p><b>Time:</b> ${r.time}</p>
  `;

  window.print();
  printArea.classList.add("hidden");
}

/* LOGOUT */
function logout(){
  location.reload();
}
</script>

</body>
</html>
