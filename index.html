<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding System</title>

<style>

/* ================= LOGIN ================= */
#loginPage {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #0b5e5e, #062c2c);
  font-family: Arial;
}

.login-card {
  width: 340px;
  padding: 30px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  text-align:center;
  color:white;
}

.login-card input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}

.login-card button {
  width: 100%;
  padding: 12px;
  background:#00b3b3;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

#error {
  color: #ff6b6b;
  font-size: 13px;
}

/* ================= SYSTEM ================= */
.hidden { display:none; }

body {
  margin:0;
  font-family: Arial;
  background:#f4f7fa;
}

header {
  background:#007a7a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  margin-top:15px;
  border-radius:10px;
}

.tab {
  display:inline-block;
  padding:10px;
  margin-right:5px;
  background:#ddd;
  border-radius:6px;
  cursor:pointer;
}

.tab.active {
  background:#007a7a;
  color:white;
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
}

button {
  width:100%;
  padding:12px;
  background:#007a7a;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.output {
  background:#eef7f7;
  padding:15px;
  white-space:pre-line;
  border-left:5px solid #007a7a;
}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginPage">
  <div class="login-card">
    <h2>Onboarding System</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Sign In</button>
    <p id="error"></p>
  </div>
</div>

<!-- ================= SYSTEM ================= -->
<div id="system" class="hidden">

<header>
  <div id="roleTitle">Onboarding System</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="card">
    <div id="menu"></div>
  </div>

  <!-- ONBOARD -->
  <div id="onboard" class="card hidden">
    <h3>Onboarding</h3>
    <input id="n_name" placeholder="Full Name">
    <input id="n_dept" placeholder="Department">
    <select id="n_email">
      <option>Create Email</option>
      <option>No Email Required</option>
    </select>
    <select id="n_fin">
      <option>Grant FinPower Access</option>
      <option>No Access</option>
    </select>
    <button onclick="submitOnboard()">Submit</button>
  </div>

  <!-- OFFBOARD -->
  <div id="offboard" class="card hidden">
    <h3>Offboarding</h3>
    <input id="o_name" placeholder="Full Name">
    <input id="o_dept" placeholder="Department">
    <select id="o_email">
      <option>Disable Email Account</option>
      <option>Keep Email Active</option>
    </select>
    <select id="o_fin">
      <option>Revoke FinPower Access</option>
      <option>Keep Access</option>
    </select>
    <select id="o_status">
      <option>Deactivate Account</option>
      <option>Keep Active</option>
    </select>
    <button onclick="submitOffboard()">Submit</button>
  </div>

  <!-- TRANSFER -->
  <div id="transfer" class="card hidden">
    <h3>Department Transfer</h3>
    <input id="t_name" placeholder="Full Name">
    <input id="t_from" placeholder="From Department">
    <input id="t_to" placeholder="To Department">

    <select id="t_email">
      <option>Update Email Access</option>
      <option>Reassign Email</option>
      <option>No Change</option>
    </select>

    <select id="t_fin">
      <option>Update FinPower Access</option>
      <option>Remove Access</option>
      <option>No Change</option>
    </select>

    <select id="t_status">
      <option>Update Account Status</option>
      <option>Keep Active</option>
      <option>Deactivate Account</option>
    </select>

    <button onclick="submitTransfer()">Submit</button>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <h3>System Output</h3>
    <div id="output" class="output">No data</div>
  </div>

</div>
</div>

<script>

/* ================= USERS ================= */
const users = {
  hr: { pass:"hr123", role:"HR" },
  it: { pass:"it123", role:"IT" },
  head: { pass:"head123", role:"Dept Head" }
};

let currentRole = "";

/* ================= LOGIN ================= */
function login(){

  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  error.innerText = "";

  if(users[u] && users[u].pass === p){

    currentRole = users[u].role;

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("system").classList.remove("hidden");

    document.getElementById("roleTitle").innerText =
      "System Access Granted: " + currentRole;

    loadMenu();

    /* ✅ FIX: AUTO OPEN FIRST PAGE */
    if(currentRole === "HR") show("onboard");
    else if(currentRole === "Dept Head") show("transfer");
    else if(currentRole === "IT") show("transfer");

  } else {
    error.innerText = "❌ Access Denied: Invalid Credentials";
  }
}

/* ENTER KEY LOGIN */
document.addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});

/* ================= MENU ================= */
function loadMenu(){

  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  if(currentRole === "HR"){
    menu.innerHTML += `<div class="tab" onclick="show('onboard')">Onboarding</div>`;
    menu.innerHTML += `<div class="tab" onclick="show('offboard')">Offboarding</div>`;
    menu.innerHTML += `<div class="tab" onclick="show('transfer')">Department Transfer</div>`;
  }

  if(currentRole === "Dept Head"){
    menu.innerHTML += `<div class="tab" onclick="show('transfer')">Department Transfer</div>`;
  }

  if(currentRole === "IT"){
    menu.innerHTML += `<div class="tab" onclick="show('transfer')">View Transfers</div>`;
  }
}

/* ================= SHOW ================= */
function show(id){

  document.getElementById("onboard").classList.add("hidden");
  document.getElementById("offboard").classList.add("hidden");
  document.getElementById("transfer").classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}

/* ================= ACTIONS ================= */
function submitOnboard(){
  document.getElementById("output").innerText =
`ONBOARDING REQUEST
Name: ${document.getElementById("n_name").value}
Department: ${document.getElementById("n_dept").value}
Email: ${document.getElementById("n_email").value}
FinPower: ${document.getElementById("n_fin").value}
Status: ACTIVE`;
}

function submitOffboard(){
  document.getElementById("output").innerText =
`OFFBOARDING REQUEST
Name: ${document.getElementById("o_name").value}
Department: ${document.getElementById("o_dept").value}
Email: ${document.getElementById("o_email").value}
FinPower: ${document.getElementById("o_fin").value}
Account: ${document.getElementById("o_status").value}`;
}

function submitTransfer(){
  document.getElementById("output").innerText =
`DEPARTMENT TRANSFER REQUEST
Name: ${document.getElementById("t_name").value}
From: ${document.getElementById("t_from").value}
To: ${document.getElementById("t_to").value}
Email: ${document.getElementById("t_email").value}
FinPower: ${document.getElementById("t_fin").value}
Account: ${document.getElementById("t_status").value}`;
}

/* ================= LOGOUT ================= */
function logout(){
  location.reload();
}

</script>

</body>
</html>
